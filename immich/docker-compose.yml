# ─────────────────────────────────────────────────────────────────────────────
# Immich — Self-Hosted Google Photos with AI Search
# Owner: Darrian Belcher | Created: 2026-02-25
#
# Deploy on CT100 (100.95.125.112):
#   mkdir -p /opt/immich && cd /opt/immich
#   # Copy this file there, then:
#   docker compose up -d
#
# Access:
#   Local:     http://100.117.1.171:2283
#   Tailscale: http://100.95.125.112:2283
#   iPhone:    Install "Immich" from App Store → server URL above
#
# AI Features (run automatically after first upload):
#   - CLIP semantic search ("Jordan 1", "receipt", "sneaker")
#   - Face recognition (auto-groups by person)
#   - Smart albums by location, date, people
#   - Duplicate detection
# ─────────────────────────────────────────────────────────────────────────────

name: immich

services:

  immich-server:
    container_name: immich-server
    image: ghcr.io/immich-app/immich-server:release
    restart: unless-stopped
    ports:
      - "2283:2283"
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_HOSTNAME=immich-postgres
      - DB_USERNAME=immich
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
    depends_on:
      immich-redis:
        condition: service_healthy
      immich-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2283/api/server/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  immich-machine-learning:
    container_name: immich-machine-learning
    image: ghcr.io/immich-app/immich-machine-learning:release
    restart: unless-stopped
    volumes:
      - immich-model-cache:/cache
    # CPU-only inference — works great on Ryzen 7
    # Expect ~1-3 sec/photo during initial indexing, instant after
    environment:
      - MACHINE_LEARNING_WORKERS=1
      - MACHINE_LEARNING_WORKER_TIMEOUT=120

  immich-redis:
    container_name: immich-redis
    image: docker.io/redis:6.2-alpine
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

  immich-postgres:
    container_name: immich-postgres
    # pgvecto-rs adds vector search support — required for CLIP semantic search
    image: docker.io/tensorchord/pgvecto-rs:pg14-v0.2.0
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: immich
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - immich-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: >-
        pg_isready --dbname="immich" --username="immich" || exit 1;
        Chksum="$$(psql --dbname="immich" --username="immich" --tuples-only --no-align
        --command='SELECT COALESCE(SUM(checksum_failures), 0) FROM pg_stat_database')";
        echo "checksum failure count - $Chksum";
        [ "$Chksum" = '0' ] || exit 1
      interval: 5m
      start_interval: 30s
      start_period: 5m

volumes:
  immich-model-cache:
    driver: local
  immich-pgdata:
    driver: local
