name: Lint & Test (All Branches)

on:
  push:
    branches:
      - feature/**
      - bugfix/**
      - hotfix/**
      - dev
      - qa
      - staging
      - main
  pull_request:
    branches:
      - dev
      - qa
      - staging
      - main

jobs:
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Syntax check all pages
        run: |
          find pages/ utils/ -name "*.py" | xargs python3 -m py_compile && echo "✅ Syntax OK"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install lint tools
        run: pip install flake8 bandit

      - name: Flake8 (style)
        run: flake8 pages/ utils/ --max-line-length=120 --extend-ignore=E203,W503 --count
        continue-on-error: true

      - name: Security scan (bandit)
        run: bandit -r pages/ utils/ -ll --exit-zero
