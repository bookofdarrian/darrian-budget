name: Lint & Test (All Branches)

on:
  push:
    branches:
      - feature/**
      - dev
      - qa
      - staging
      - main
  pull_request:
    branches:
      - dev
      - qa
      - staging
      - main

jobs:
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short 2>&1 || true
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bandit
        run: pip install bandit
      - name: Run security scan
        run: bandit -r pages/ utils/ -ll --exit-zero
        continue-on-error: true
