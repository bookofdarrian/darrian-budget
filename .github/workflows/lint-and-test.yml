name: Lint & Test (All Branches)

on:
  push:
    branches:
      - feature/**
      - dev
      - qa
      - staging
      - main
  pull_request:
    branches:
      - dev
      - qa
      - staging
      - main

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black pylint isort flake8
          pip install -r requirements.txt
      
      - name: Check code formatting with Black
        run: black --check .
        continue-on-error: true
      
      - name: Check import sorting with isort
        run: isort --check-only .
        continue-on-error: true
      
      - name: Lint with Pylint
        run: pylint --exit-zero pages/ utils/ aura/ *.py
        continue-on-error: true
      
      - name: Check with Flake8
        run: flake8 pages/ utils/ aura/ *.py --max-line-length=100
        continue-on-error: true

  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install -r requirements.txt
      
      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing || true
        continue-on-error: true
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: darrian-budget:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
