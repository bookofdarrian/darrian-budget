name: Deploy to QA

on:
  push:
    branches:
      - qa

env:
  APP_DIR: /opt/darrian-budget
  CONTAINER: darrian-budget

jobs:
  test:
    name: Gate — QA Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio pytest-cov
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Syntax check
        run: find pages/ utils/ -name "*.py" | xargs python3 -m py_compile && echo "✅ Syntax OK"
      - name: Unit tests (must pass)
        run: pytest tests/unit/ -v --tb=short
      - name: Security scan
        run: |
          pip install bandit
          bandit -r pages/ utils/ -ll --exit-zero

  deploy:
    name: Deploy qa → Home Lab
    runs-on: self-hosted
    needs: test
    steps:
      - name: Pull latest code
        run: |
          cd ${{ env.APP_DIR }}
          git fetch origin
          git reset --hard origin/qa
          git checkout qa
          git pull origin qa

      - name: Prune stale colliding Streamlit pages
        run: |
          cd ${{ env.APP_DIR }}
          python3 scripts/prune_stale_streamlit_pages.py --repo-dir . --apply

      - name: Install/update Python deps
        run: |
          cd ${{ env.APP_DIR }}
          pip install -r requirements.txt
          pip install -r requirements-dev.txt --quiet

      - name: Restart container
        run: sudo docker restart ${{ env.CONTAINER }}

      - name: Health check
        run: |
          sleep 10
          curl -sf http://localhost:8501/_stcore/health && echo "✅ QA is healthy" || echo "⚠️ Still starting..."
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "QA deployed - commit ${{ github.sha }} | Next: promote qa -> staging"
