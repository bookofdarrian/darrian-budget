name: Deploy to QA

on:
  push:
    branches:
      - qa

env:
  PROD_HOST: 100.95.125.112
  APP_DIR: /opt/darrian-budget
  CONTAINER: darrian-budget

jobs:
  test:
    name: QA Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short 2>&1 || true
        continue-on-error: true

  deploy:
    name: Deploy qa → Home Lab
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH (if secrets configured)
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$TAILSCALE_AUTHKEY" ] || [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "ℹ️  Secrets not set — skipping SSH deploy."
            echo "   ✅ QA code is on GitHub. Manual deploy: ssh homelab 'cd /opt/darrian-budget && git pull origin qa && docker restart darrian-budget'"
            exit 0
          fi

          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey="$TAILSCALE_AUTHKEY" --hostname=gha-qa --accept-routes --timeout=30s

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.PROD_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@${{ env.PROD_HOST }} \
            "cd ${{ env.APP_DIR }} && git pull origin qa && docker restart ${{ env.CONTAINER }} && echo 'QA DEPLOYED ✅'"

      - name: Summary
        if: always()
        run: |
          echo "Branch: qa | Commit: ${{ github.sha }}"
          echo "Next: promote qa → staging when QA testing passes"
