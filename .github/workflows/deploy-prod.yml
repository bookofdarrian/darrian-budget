name: Deploy to PRODUCTION (Self-Hosted)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_DIR: /opt/darrian-budget
  CONTAINER: darrian-budget

jobs:
  deploy:
    name: Deploy main → Production (peachstatesavings.com)
    runs-on: self-hosted
    steps:
      - name: Deployment info
        run: |
          echo "🚀 Deploying to https://www.peachstatesavings.com"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"

      - name: Pull latest code
        run: |
          cd ${{ env.APP_DIR }}
          git fetch origin
          git reset --hard origin/main
          git checkout main
          git pull origin main

      - name: Restart container
        run: sudo docker restart ${{ env.CONTAINER }}

      - name: Health check
        run: |
          sleep 10
          curl -sf http://localhost:8501/_stcore/health \
            && echo "✅ Production is healthy at https://www.peachstatesavings.com" \
            || echo "⚠️ Health check failed — container may still be starting"
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "✅ Production deployment complete"
          echo "Site: https://www.peachstatesavings.com"
          echo "Commit: ${{ github.sha }}"
