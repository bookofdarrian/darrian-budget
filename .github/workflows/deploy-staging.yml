name: Deploy to STAGING

on:
  push:
    branches:
      - staging

env:
  APP_DIR: /opt/darrian-budget
  CONTAINER: darrian-budget

jobs:
  test:
    name: Staging Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install pytest pytest-asyncio && pip install -r requirements.txt
      - run: pytest tests/unit/ -v --tb=short 2>&1 || true
        continue-on-error: true

  deploy:
    name: Deploy staging → Home Lab
    runs-on: self-hosted
    needs: test
    steps:
      - name: Pull latest code
        run: |
          cd ${{ env.APP_DIR }}
          git fetch origin
          git reset --hard origin/staging
          git checkout staging
          git pull origin staging

      - name: Restart container
        run: sudo docker restart ${{ env.CONTAINER }}

      - name: Health check
        run: |
          sleep 8
          curl -sf http://localhost:8501/_stcore/health && echo "✅ STAGING is healthy" || echo "⚠️ Still starting..."
        continue-on-error: true

      - name: Summary
        if: always()
        run: echo "STAGING deployed — commit ${{ github.sha }} | Next: merge staging → main for production"
