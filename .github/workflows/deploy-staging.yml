name: Deploy to STAGING

on:
  push:
    branches:
      - staging

env:
  APP_DIR: /opt/darrian-budget
  CONTAINER: darrian-budget

jobs:
  test:
    name: Gate — Staging Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio pytest-cov
          pip install -r requirements.txt
      - name: Syntax check
        run: find pages/ utils/ -name "*.py" | xargs python3 -m py_compile && echo "✅ Syntax OK"
      - name: Full unit tests (must pass — this is pre-prod)
        run: pytest tests/unit/ -v --tb=long
      - name: Security scan
        run: |
          pip install bandit
          bandit -r pages/ utils/ -ll --exit-zero

  deploy:
    name: Deploy staging → Home Lab
    runs-on: self-hosted
    needs: test
    steps:
      - name: Pull latest code
        run: |
          cd ${{ env.APP_DIR }}
          git fetch origin
          git reset --hard origin/staging
          git checkout staging
          git pull origin staging

      - name: Install/update Python deps
        run: |
          cd ${{ env.APP_DIR }}
          pip install -r requirements.txt --quiet

      - name: Restart container
        run: sudo docker restart ${{ env.CONTAINER }}

      - name: Health check
        run: |
          sleep 10
          curl -sf http://localhost:8501/_stcore/health && echo "✅ STAGING is healthy" || echo "⚠️ Still starting..."
        continue-on-error: true

      - name: Summary
        if: always()
        run: echo "STAGING deployed — commit ${{ github.sha }} | Next: merge staging → main for production"
