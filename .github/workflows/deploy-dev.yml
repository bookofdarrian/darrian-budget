name: Deploy to DEV (Home Lab)

on:
  push:
    branches:
      - dev

env:
  APP_DIR: /opt/darrian-budget
  CONTAINER: darrian-budget

jobs:
  deploy:
    name: Deploy dev → Home Lab
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd ${{ env.APP_DIR }}
          git fetch origin
          git reset --hard origin/dev
          git checkout dev
          git pull origin dev

      - name: Restart container
        run: sudo docker restart ${{ env.CONTAINER }}

      - name: Health check
        run: |
          sleep 8
          curl -sf http://localhost:8501/_stcore/health && echo "✅ DEV is healthy" || echo "⚠️ Still starting..."
        continue-on-error: true

      - name: Summary
        if: always()
        run: echo "DEV deployed — commit ${{ github.sha }}"
