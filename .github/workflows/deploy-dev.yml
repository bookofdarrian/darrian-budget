name: Deploy to DEV (Home Lab)

on:
  push:
    branches:
      - dev

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/budget-app
  DEV_HOST: 100.95.125.112
  DEV_PORT: 8501

jobs:
  deploy-dev:
    name: Deploy to Dev Environment
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Home Lab via SSH
        # Only runs if DEV_SSH_KEY secret is configured
        if: ${{ secrets.DEV_SSH_KEY != '' }}
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEV_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.DEV_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@${{ env.DEV_HOST }} << 'EOF'
            cd /opt/darrian-budget || mkdir -p /opt/darrian-budget && cd /opt/darrian-budget
            git pull origin dev || true
            docker compose down || docker-compose down || true
            docker compose up -d || docker-compose up -d
            docker ps
          EOF

      - name: Skip SSH deploy (DEV_SSH_KEY not configured)
        if: ${{ secrets.DEV_SSH_KEY == '' }}
        run: |
          echo "ℹ️  DEV_SSH_KEY secret not set — skipping SSH deploy to home lab."
          echo "To enable: Settings → Secrets → New secret → DEV_SSH_KEY"
          echo "Docker image was still built and pushed to GHCR ✅"

      - name: Health Check
        run: |
          sleep 10
          curl -f http://${{ env.DEV_HOST }}:${{ env.DEV_PORT }} || echo "ℹ️  App may still be starting or SSH deploy was skipped."
        continue-on-error: true

      - name: Deployment Summary
        if: always()
        run: |
          echo "✅ DEV workflow complete"
          echo "Docker image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: dev"
          echo "Home lab: http://${{ env.DEV_HOST }}:${{ env.DEV_PORT }} (Tailscale)"
