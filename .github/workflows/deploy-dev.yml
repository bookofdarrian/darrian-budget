name: Deploy to DEV (Home Lab)

on:
  push:
    branches:
      - dev

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/budget-app
  DEV_HOST: root@100.95.125.112
  DEV_PORT: 8501
  DEV_CONTAINER: budget-app

jobs:
  deploy-dev:
    name: Deploy to Dev Environment
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Notify Deployment Started
        run: |
          echo "Deploying build ${{ github.sha }} to DEV environment..."
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
      
      - name: Deploy to Home Lab (Tailscale)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEV_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 100.95.125.112 >> ~/.ssh/known_hosts 2>/dev/null || true
          
          # Deploy via SSH
          ssh -i ~/.ssh/id_ed25519 root@100.95.125.112 << 'EOF'
          cd /opt/darrian-budget || mkdir -p /opt/darrian-budget
          git pull origin dev || true
          docker-compose down || true
          docker-compose up -d
          docker ps
          EOF
      
      - name: Health Check
        run: |
          sleep 10
          curl -f http://100.95.125.112:8501 || echo "App may still be starting..."
        continue-on-error: true
      
      - name: Deployment Summary
        if: always()
        run: |
          echo "✅ Deployment to DEV complete"
          echo "Access at: http://100.95.125.112:8501 (Tailscale)"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: dev"
