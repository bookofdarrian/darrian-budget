name: Deploy to DEV (Home Lab)

on:
  push:
    branches:
      - dev

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/budget-app
  DEV_HOST: 100.95.125.112
  DEV_PORT: 8501

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Home Lab via Tailscale
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        # Only runs if TAILSCALE_AUTHKEY secret is configured
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          if [ -z "$TAILSCALE_AUTHKEY" ]; then
            echo "ℹ️  TAILSCALE_AUTHKEY not set — skipping Tailscale + SSH deploy."
            echo "To enable: add TAILSCALE_AUTHKEY secret (from https://login.tailscale.com/admin/settings/keys)"
            exit 0
          fi
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey="$TAILSCALE_AUTHKEY" --hostname=github-actions --accept-routes
          echo "Tailscale connected. Waiting for network..."
          sleep 5
          tailscale status

      - name: Deploy via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEV_SSH_KEY }}
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          if [ -z "$TAILSCALE_AUTHKEY" ]; then
            echo "ℹ️  Skipping SSH deploy (TAILSCALE_AUTHKEY not configured)."
            exit 0
          fi
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "ℹ️  DEV_SSH_KEY not configured — skipping SSH deploy."
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.DEV_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o ConnectTimeout=30 root@${{ env.DEV_HOST }} << 'ENDSSH'
            set -e
            cd /opt/darrian-budget 2>/dev/null || (mkdir -p /opt/darrian-budget && cd /opt/darrian-budget)
            git pull origin dev || true
            docker compose down 2>/dev/null || docker-compose down 2>/dev/null || true
            docker compose up -d 2>/dev/null || docker-compose up -d
            docker ps
          ENDSSH

      - name: Health Check
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          if [ -z "$TAILSCALE_AUTHKEY" ]; then
            echo "ℹ️  Skipping health check (Tailscale not connected)"
            exit 0
          fi
          sleep 15
          curl -sf http://${{ env.DEV_HOST }}:${{ env.DEV_PORT }} > /dev/null \
            && echo "✅ App is up at http://${{ env.DEV_HOST }}:${{ env.DEV_PORT }}" \
            || echo "ℹ️  App not reachable yet (may still be starting)"
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "✅ DEV workflow complete"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev"
          echo "Commit: ${{ github.sha }}"
          echo "Home lab: http://${{ env.DEV_HOST }}:${{ env.DEV_PORT }} (via Tailscale)"
