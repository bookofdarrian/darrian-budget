name: Deploy to DEV (Home Lab)

on:
  push:
    branches:
      - dev

env:
  PROD_HOST: 100.95.125.112
  APP_DIR: /opt/darrian-budget
  CONTAINER: darrian-budget

jobs:
  deploy:
    name: Deploy dev → Home Lab
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH (if secrets configured)
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$TAILSCALE_AUTHKEY" ] || [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "ℹ️  TAILSCALE_AUTHKEY or DEPLOY_SSH_KEY not set — skipping SSH deploy."
            echo "   Add secrets in: Settings → Secrets → Actions"
            echo "   ✅ Code is on GitHub. Manual deploy: ssh homelab 'cd /opt/darrian-budget && git pull origin dev && docker restart darrian-budget'"
            exit 0
          fi

          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey="$TAILSCALE_AUTHKEY" --hostname=gha-dev --accept-routes --timeout=30s

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.PROD_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@${{ env.PROD_HOST }} \
            "cd ${{ env.APP_DIR }} && git pull origin dev && docker restart ${{ env.CONTAINER }} && echo 'DEV DEPLOYED ✅'"

      - name: Summary
        if: always()
        run: |
          echo "Branch: dev | Commit: ${{ github.sha }}"
          echo "Site: http://${{ env.PROD_HOST }}:8501 (via Tailscale)"
