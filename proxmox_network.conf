# =============================================================================
# Proxmox VE Network Configuration
# Host: pue @ 100.117.1.50
# File: /etc/network/interfaces  (copy this to the Proxmox host)
# =============================================================================
# Confirmed from `ip addr show` on 2026-02-26:
#   - Physical NIC: enp2s0 (altname: enx78553607ea20, MAC: 78:55:36:07:ea:20)
#   - Bridge name:  umbro  (Proxmox Linux bridge — non-standard name, works fine)
#   - Host IP:      100.117.1.50/24
#   - Gateway:      100.117.1.1
#   - WiFi (wlp3s0): DOWN — not used, leave as-is
# =============================================================================

auto lo
iface lo inet loopback

# Physical NIC — enslaved to the umbro bridge (no IP assigned here)
auto enp2s0
iface enp2s0 inet manual

# umbro — Proxmox Linux bridge (all VMs/CTs attach to this)
auto umbro
iface umbro inet static
    address  100.117.1.50/24
    gateway  100.117.1.1
    dns-nameservers 1.1.1.1 8.8.8.8
    bridge-ports enp2s0
    bridge-stp off
    bridge-fd 0
    bridge-vlan-aware yes

# WiFi — disabled, leave as-is
iface wlp3s0 inet manual
