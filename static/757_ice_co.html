<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>757 ICE CO. — Hampton Roads Custom Jewelry</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  body { background: #050505; font-family: 'Courier New', monospace; color: #e0e0e0; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #080808; }
  ::-webkit-scrollbar-thumb { background: #c9a84c44; border-radius: 2px; }
  button { cursor: pointer; -webkit-appearance: none; border: none; background: none; font-family: inherit; }
  a { text-decoration: none; color: inherit; }
  img { max-width: 100%; }

  /* ── LAYOUT ─────────────────────────────── */
  .shell { display: flex; min-height: 100vh; }

  /* DESKTOP SIDEBAR */
  .sidebar {
    width: 220px; min-height: 100vh;
    background: #070707;
    border-right: 1px solid #141414;
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0;
    z-index: 100; overflow-y: auto;
  }
  .sidebar-brand { padding: 28px 20px 20px; border-bottom: 1px solid #111; }
  .sidebar-brand .mark { font-size: 7px; letter-spacing: 6px; color: #c9a84c; margin-bottom: 4px; }
  .sidebar-brand .name { font-size: 20px; font-weight: 900; letter-spacing: 4px; color: #fff;
    text-shadow: 0 0 20px rgba(201,168,76,0.25); }
  .sidebar-brand .sub  { font-size: 7px; letter-spacing: 3px; color: #2e2e2e; margin-top: 4px; }
  .sidebar-nav { padding: 16px 12px; flex: 1; }
  .sidebar-nav a {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 12px; border-radius: 8px;
    font-size: 10px; letter-spacing: 3px; color: #444;
    margin-bottom: 3px; transition: all 0.15s;
  }
  .sidebar-nav a:hover, .sidebar-nav a.active {
    background: rgba(201,168,76,0.07);
    color: #c9a84c;
    border-left: 2px solid #c9a84c;
  }
  .sidebar-nav a .nav-icon { font-size: 14px; flex-shrink: 0; }
  .sidebar-contact {
    padding: 16px; border-top: 1px solid #111; font-size: 9px;
    color: #2a2a2a; letter-spacing: 2px; line-height: 2;
  }
  .sidebar-contact a { color: #555; }
  .sidebar-contact a:hover { color: #c9a84c; }

  /* MAIN CONTENT */
  .main { margin-left: 220px; flex: 1; padding-bottom: 80px; }

  /* MOBILE TOP BAR */
  .mobile-bar {
    display: none;
    position: sticky; top: 0; z-index: 90;
    background: #060606; border-bottom: 1px solid #111;
    padding: 14px 16px 10px;
    align-items: center; justify-content: space-between;
  }
  .mobile-bar .brand-name { font-size: 18px; font-weight: 900; letter-spacing: 4px; color: #fff; }
  .mobile-bar .brand-sub  { font-size: 7px; letter-spacing: 3px; color: #333; }

  /* MOBILE BOTTOM NAV */
  .mobile-nav {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: #070707; border-top: 1px solid #141414;
    padding: 10px 4px 16px;
    justify-content: space-around;
  }
  .mobile-nav a {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-size: 8px; letter-spacing: 2px; color: #333; padding: 4px 8px;
    border-radius: 6px; transition: all 0.15s;
  }
  .mobile-nav a .nav-icon { font-size: 16px; }
  .mobile-nav a.active, .mobile-nav a:hover { color: #c9a84c; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { margin-left: 0; padding-bottom: 100px; }
    .mobile-bar { display: flex; }
    .mobile-nav { display: flex; }
  }

  /* ── HERO ───────────────────────────────── */
  .hero {
    background: linear-gradient(160deg, #0a0800 0%, #060606 40%, #090900 100%);
    border-bottom: 1px solid #151500;
    padding: 80px 60px 60px;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 40% at 70% 50%, rgba(201,168,76,0.04), transparent);
    pointer-events: none;
  }
  .hero-eyebrow { font-size: 9px; letter-spacing: 8px; color: #c9a84c; margin-bottom: 14px; }
  .hero-title   { font-size: 64px; font-weight: 900; letter-spacing: 6px; color: #fff; line-height: 1;
    text-shadow: 0 0 60px rgba(201,168,76,0.15); }
  .hero-sub     { font-size: 11px; letter-spacing: 4px; color: #333; margin-top: 10px; }
  .hero-desc    { max-width: 500px; font-size: 13px; color: #555; line-height: 1.9; margin-top: 28px;
    font-family: -apple-system, sans-serif; }
  .hero-badges  { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 28px; }
  .badge {
    padding: 7px 14px; border-radius: 20px;
    border: 1px solid #1e1e1e; background: #0c0c0c;
    font-size: 9px; letter-spacing: 3px; color: #555;
  }
  .badge.gold { border-color: #c9a84c33; color: #c9a84c; }
  @media (max-width: 768px) {
    .hero { padding: 32px 20px 40px; }
    .hero-title { font-size: 36px; letter-spacing: 3px; }
  }

  /* ── SECTION SHELLS ─────────────────────── */
  .section { padding: 60px 60px 40px; border-bottom: 1px solid #0e0e0e; }
  .section-head { margin-bottom: 40px; }
  .section-eyebrow { font-size: 8px; letter-spacing: 6px; color: #c9a84c; margin-bottom: 8px; }
  .section-title    { font-size: 28px; font-weight: 900; letter-spacing: 3px; color: #fff; }
  .section-desc     { font-size: 12px; color: #3a3a3a; margin-top: 6px; letter-spacing: 1px; }
  @media (max-width: 768px) {
    .section { padding: 36px 16px 28px; }
    .section-title { font-size: 20px; }
  }

  /* ── GENDER FILTER ──────────────────────── */
  .filter-row { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
  .filter-btn {
    padding: 8px 18px; border-radius: 20px;
    border: 1px solid #1a1a1a; background: #0b0b0b;
    font-size: 9px; letter-spacing: 3px; color: #444;
    transition: all 0.15s; font-family: 'Courier New', monospace;
  }
  .filter-btn.active { border-color: #c9a84c; color: #c9a84c; background: rgba(201,168,76,0.06); }
  .filter-btn:hover  { border-color: #2e2e2e; color: #666; }

  /* ── PRODUCT GRID ───────────────────────── */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  @media (max-width: 600px) {
    .product-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  }

  /* ── PRODUCT CARD ───────────────────────── */
  .card {
    background: #090909; border: 1px solid #141414; border-radius: 12px;
    overflow: hidden; transition: all 0.2s; cursor: pointer;
    position: relative;
  }
  .card:hover { border-color: #c9a84c33; box-shadow: 0 8px 32px rgba(0,0,0,0.6); transform: translateY(-2px); }
  .card-img {
    aspect-ratio: 1; background: #0d0d0d;
    display: flex; align-items: center; justify-content: center;
    font-size: 56px; position: relative; overflow: hidden;
  }
  .card-img::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 60%, #090909);
  }
  .card-img .shimmer {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 30%, rgba(201,168,76,0.03) 50%, transparent 70%);
  }
  .card-body { padding: 14px 14px 16px; }
  .card-tag  { font-size: 7px; letter-spacing: 3px; color: #c9a84c; margin-bottom: 5px; }
  .card-name { font-size: 13px; font-weight: 700; color: #ddd; margin-bottom: 4px; letter-spacing: 1px; }
  .card-desc { font-size: 10px; color: #3a3a3a; line-height: 1.6; font-family: -apple-system, sans-serif; }
  .card-footer { padding: 0 14px 14px; display: flex; justify-content: space-between; align-items: center; }
  .card-price { font-size: 15px; font-weight: 900; color: #c9a84c; letter-spacing: 1px; }
  .card-price-sub { font-size: 8px; color: #2e2e2e; letter-spacing: 2px; margin-top: 1px; }
  .card-order {
    padding: 8px 14px; border-radius: 6px;
    background: rgba(201,168,76,0.08); border: 1px solid #c9a84c33;
    color: #c9a84c; font-size: 9px; letter-spacing: 2px;
    font-family: 'Courier New', monospace; transition: all 0.15s;
  }
  .card-order:hover { background: rgba(201,168,76,0.15); border-color: #c9a84c66; }
  .card-badge {
    position: absolute; top: 10px; right: 10px; z-index: 2;
    padding: 4px 8px; border-radius: 4px; font-size: 7px; letter-spacing: 2px;
  }
  .badge-new   { background: #c9a84c; color: #000; }
  .badge-fire  { background: #ff4444; color: #fff; }
  .badge-plain { background: #222; color: #888; border: 1px solid #333; }
  @media (max-width: 600px) {
    .card-body { padding: 10px 10px 10px; }
    .card-name { font-size: 11px; }
    .card-desc { display: none; }
    .card-footer { padding: 0 10px 10px; }
    .card-price { font-size: 13px; }
    .card-order { font-size: 8px; padding: 6px 10px; }
  }

  /* ── GRILLZ BUILDER EMBED ───────────────── */
  .builder-wrap {
    display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: start;
  }
  @media (max-width: 900px) {
    .builder-wrap { grid-template-columns: 1fr; }
  }
  .builder-info { }
  .builder-panel {
    background: #090909; border: 1px solid #141414; border-radius: 14px; overflow: hidden;
  }

  /* ── SECTION: GRILLZ CONTROLS ───────────── */
  .ctrl-section { border: 1px solid #141414; border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; background: #090909; }
  .ctrl-label   { font-size: 8px; letter-spacing: 4px; color: #c9a84c; margin-bottom: 10px; }
  .ctrl-grid-2  { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .ctrl-grid-4  { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
  .ctrl-btn {
    padding: 9px 10px; border-radius: 7px;
    border: 1px solid #1c1c1c; background: #0c0c0c;
    color: #666; font-size: 10px; text-align: left;
    transition: all 0.15s; font-family: 'Courier New', monospace;
    line-height: 1.3;
  }
  .ctrl-btn.sel { border-color: #c9a84c; color: #c9a84c; background: rgba(201,168,76,0.08); font-weight: 700; }
  .ctrl-btn .sub { font-size: 8px; opacity: 0.5; margin-top: 2px; display: block; }
  .toggle-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .toggle-btn {
    flex: 1; padding: 10px; border-radius: 8px;
    border: 1px solid #1a1a1a; background: #090909;
    color: #444; font-size: 9px; letter-spacing: 3px;
    font-family: 'Courier New', monospace; transition: all 0.2s;
  }
  .toggle-btn.on { border-color: #c9a84c; color: #c9a84c; background: rgba(201,168,76,0.06); }

  /* ── GRILLZ PREVIEW ─────────────────────── */
  .preview-box {
    background: #060606; border: 1px solid #111; border-radius: 14px;
    padding: 32px 20px 24px; display: flex; flex-direction: column;
    align-items: center; gap: 6px; margin-bottom: 12px;
    box-shadow: inset 0 2px 20px rgba(0,0,0,0.6);
  }
  .preview-divider {
    height: 8px; width: 200px; border-radius: 4px;
    background: linear-gradient(180deg,#2a1a0a,#120a04); opacity: 0.7;
  }
  .preview-label { margin-top: 12px; font-size: 9px; letter-spacing: 3px; color: #333; text-align: center; }
  .price-banner {
    display: flex; justify-content: space-between; align-items: center;
    background: linear-gradient(135deg, #0d0900, #1a1100);
    border: 1px solid #c9a84c22; border-radius: 10px;
    padding: 14px 18px; margin-bottom: 10px;
  }
  .price-low  { font-size: 22px; color: #c9a84c; font-weight: 900; }
  .price-note { font-size: 8px; color: #333; margin-top: 3px; letter-spacing: 2px; }

  /* ── CONTACT / ORDER ────────────────────── */
  .order-section { padding: 60px; background: #060606; }
  .order-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 40px; }
  @media (max-width: 900px) { .order-grid { grid-template-columns: 1fr; } }
  @media (max-width: 768px) { .order-section { padding: 36px 16px; } }

  .order-card {
    background: #090909; border: 1px solid #141414; border-radius: 14px;
    padding: 28px; transition: all 0.2s;
  }
  .order-card:hover { border-color: #c9a84c22; }
  .order-card .oc-icon { font-size: 28px; margin-bottom: 14px; }
  .order-card .oc-title { font-size: 14px; font-weight: 700; color: #ddd; letter-spacing: 2px; margin-bottom: 6px; }
  .order-card .oc-desc  { font-size: 11px; color: #3a3a3a; line-height: 1.8; font-family: -apple-system, sans-serif; margin-bottom: 18px; }
  .order-card .oc-btn {
    display: block; width: 100%; padding: 13px;
    border-radius: 8px; border: 1px solid #c9a84c44;
    background: rgba(201,168,76,0.07); color: #c9a84c;
    font-size: 10px; letter-spacing: 3px; text-align: center;
    font-family: 'Courier New', monospace; transition: all 0.2s;
  }
  .order-card .oc-btn:hover { background: rgba(201,168,76,0.14); border-color: #c9a84c; }

  /* ── MARKET RESEARCH STRIP ──────────────── */
  .market-strip { padding: 60px; background: #050505; border-bottom: 1px solid #0e0e0e; }
  .market-strip h2 { font-size: 20px; font-weight: 900; letter-spacing: 3px; color: #fff; margin-bottom: 30px; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; margin-bottom: 40px; }
  .stat-card { background: #090909; border: 1px solid #141414; border-radius: 10px; padding: 20px 18px; }
  .stat-num  { font-size: 26px; font-weight: 900; color: #c9a84c; letter-spacing: 1px; }
  .stat-label{ font-size: 8px; letter-spacing: 3px; color: #333; margin-top: 4px; }
  .insight-list { list-style: none; }
  .insight-list li {
    padding: 13px 0; border-bottom: 1px solid #0e0e0e;
    font-size: 12px; color: #555; line-height: 1.7;
    font-family: -apple-system, sans-serif;
    display: flex; gap: 12px;
  }
  .insight-list li::before { content: '◆'; color: #c9a84c33; flex-shrink: 0; margin-top: 1px; }
  @media (max-width: 768px) { .market-strip { padding: 36px 16px; } }

  /* ── FOOTER ─────────────────────────────── */
  .footer {
    padding: 40px 60px; text-align: center;
    font-size: 8px; letter-spacing: 4px; color: #1c1c1c; line-height: 2.5;
  }
  @media (max-width: 768px) { .footer { padding: 30px 16px; } }

  /* ── DIVIDER ────────────────────────────── */
  .gold-line { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, #c9a84c, transparent); margin: 0 auto 16px; }

  /* ── MODAL OVERLAY ──────────────────────── */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.88);
    z-index: 200; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal {
    background: #0a0a0a; border: 1px solid #c9a84c33; border-radius: 14px;
    padding: 32px; max-width: 480px; width: 100%; max-height: 80vh; overflow-y: auto;
    position: relative;
  }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: #141414; border: 1px solid #222; color: #666;
    width: 28px; height: 28px; border-radius: 50%;
    font-size: 12px; display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { color: #c9a84c; border-color: #c9a84c44; }
</style>
</head>

<div id="root"></div>

function Tooth({ index, metal, row, style, stoneColor, stoneCount }) {
  const isFang  = style === "fangs" && (index === 0 || index === 5);
  const isOpen  = style === "openface" || style === "half";
  const stone   = STONES[stoneColor];
  const hasStone = stoneColor !== "none" && row === "top" && index < stoneCount;
  const w = row === "top" ? 36 : 31;
  const h = isFang ? 56 : (row === "top" ? 46 : 38);
  return (
    <div style={{
      position:"relative", width:w, height:h,
      borderRadius: isFang ? "8px 8px 3px 3px" : "9px 9px 7px 7px",
      background: metal.grad, border:`1.5px solid ${metal.border}`,
      boxShadow:`0 0 10px ${metal.glow},0 2px 4px rgba(0,0,0,0.8),inset 0 1px 0 rgba(255,255,255,0.18)`,
      display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,overflow:"hidden",
    }}>
      {isOpen && !hasStone && (
        <div style={{
          position:"absolute", top:style==="half"?"48%":"14%",
          left:"13%",right:"13%",bottom:"11%",borderRadius:5,
          background:"linear-gradient(180deg,#f9f0de,#e8dcc4)",
          boxShadow:"inset 0 2px 4px rgba(0,0,0,0.35)",
        }}/>
      )}
      {hasStone && stone.gem && (
        <div style={{
          width:18,height:18,borderRadius:"50%",background:stone.gem,
          boxShadow:`0 0 10px ${stone.glow},0 0 20px ${stone.glow}66,inset 0 1px 3px rgba(255,255,255,0.7)`,
          border:"1px solid rgba(255,255,255,0.35)",zIndex:2,
        }}/>
      )}
    </div>
  );
}

function GrillPreview({ showTop, showBottom, topMetal, bottomMetal, style, stoneColor, stoneCount }) {

  return (
    <div className="preview-box">

      {showTop && (
        <div style={{display:"flex",gap:4,alignItems:"flex-end"}}>
          {[0,1,2,3,4,5].map(i => <Tooth key={i} index={i} metal={top} row="top" style={style} stoneColor={stoneColor} stoneCount={stoneCount}/>)}

      <div className="preview-divider"/>
      {showBottom && (

    </div>
  );
}

function estimateCost(topMetal, bottomMetal, stoneColor, stoneCount, style, showTop, showBottom) {
  let base = 0;
  const metalCost = { gold:250, white:350, rose:320, black:380 };
  if (showTop)    base += metalCost[topMetal];
  if (showBottom) base += metalCost[bottomMetal];
  if (stoneColor === "diamond") base += stoneCount * 200;
  else if (stoneColor === "canary") base += stoneCount * 180;
  else if (stoneColor !== "none") base += stoneCount * 75;
  if (style === "fangs") base += 100;
  return base;
}
