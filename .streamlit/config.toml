[theme]
# PSS base dark theme — overridden per-brand via inject_cc_css() / inject_soleops_css()
base = "dark"
primaryColor = "#FF6B35"
backgroundColor = "#0F1629"
secondaryBackgroundColor = "#1A2744"
textColor = "#E2E8F0"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
