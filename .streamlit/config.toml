[theme]
# PSS dark navy — SoleOps + PSS pages use this base.
# CC pages override to dark-purple via inject_cc_css() (same dark base, different palette).
base = "dark"
primaryColor = "#FF6B35"
backgroundColor = "#0D1117"
secondaryBackgroundColor = "#161B22"
textColor = "#E6EDF3"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
