[theme]
# Light base — CC pages look correct natively.
# PSS + SoleOps force dark via :root CSS variable overrides in inject_css().
base = "light"
primaryColor = "#7C3AED"
backgroundColor = "#F8F7FF"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#111827"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
