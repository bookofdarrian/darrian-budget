# ─────────────────────────────────────────────────────────────────────────────
# Prometheus Configuration
# Scrapes: Node Exporter, cAdvisor, Prometheus itself
# Retention: 30 days (set in docker-compose.yml)
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval: 15s          # How often to scrape targets
  evaluation_interval: 15s      # How often to evaluate alert rules
  scrape_timeout: 10s

  # Labels added to all time series from this Prometheus instance
  external_labels:
    monitor: "homelab-ct100"
    host: "100.117.1.171"

# ── Alert Rules ───────────────────────────────────────────────────────────────
rule_files:
  - "/etc/prometheus/rules/*.yml"

# ── Alertmanager ─────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ── Scrape Configs ────────────────────────────────────────────────────────────
scrape_configs:

  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          instance: "prometheus"

  # Node Exporter — host CPU, RAM, disk, network, filesystem
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: "ct100"
          host: "100.117.1.171"

  # cAdvisor — per-container metrics
  - job_name: "cadvisor"
    scrape_interval: 15s
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          instance: "ct100"
          host: "100.117.1.171"

  # AURA Compression Service (if it exposes /metrics in the future)
  # - job_name: "aura"
  #   static_configs:
  #     - targets: ["aura-compression:8000"]
