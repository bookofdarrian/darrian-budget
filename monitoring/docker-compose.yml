version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Server Monitoring Stack — Grafana + Prometheus
#
# Services:
#   • Prometheus      → metrics database          → port 9090
#   • Grafana         → dashboards & alerts        → port 3000
#   • Node Exporter   → host CPU/RAM/disk/network  → port 9100
#   • cAdvisor        → per-container metrics      → port 8080
#   • Alertmanager    → alert routing (phone/email)→ port 9093
#
# Usage:
#   cd monitoring
#   cp .env.example .env          # fill in your alert credentials
#   docker-compose up -d
#
# Grafana: http://100.117.1.171:3000  (admin / see .env)
# Import dashboard 1860 for instant Node Exporter Full dashboard
# ─────────────────────────────────────────────────────────────────────────────

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  plausible_db_data:
  plausible_events_data:

services:

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    mem_limit: 512m

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "3000:3000"
    environment:
      # Admin credentials — change these in .env
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-homelab2026}
      # Allow anonymous viewers (read-only) — set to false to require login
      - GF_AUTH_ANONYMOUS_ENABLED=false
      # Disable telemetry
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      # HTTPS with self-signed cert
      - GF_SERVER_PROTOCOL=https
      - GF_SERVER_HTTP_PORT=3000
      - GF_SERVER_CERT_FILE=/etc/grafana/certs/grafana.crt
      - GF_SERVER_CERT_KEY=/etc/grafana/certs/grafana.key
      # SMTP for email alerts (optional — fill in .env)
      - GF_SMTP_ENABLED=${GF_SMTP_ENABLED:-false}
      - GF_SMTP_HOST=${GF_SMTP_HOST:-smtp.gmail.com:587}
      - GF_SMTP_USER=${GF_SMTP_USER:-}
      - GF_SMTP_PASSWORD=${GF_SMTP_PASSWORD:-}
      - GF_SMTP_FROM_ADDRESS=${GF_SMTP_FROM_ADDRESS:-grafana@homelab.local}
      # Provisioning
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/certs:/etc/grafana/certs:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    mem_limit: 256m

  # ── Node Exporter ────────────────────────────────────────────────────────────
  # Exposes host-level metrics: CPU, RAM, disk, network, filesystem
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    pid: host
    mem_limit: 64m

  # ── cAdvisor ─────────────────────────────────────────────────────────────────
  # Per-container CPU, RAM, network, disk I/O metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    mem_limit: 128m

  # ── Plausible Analytics ──────────────────────────────────────────────────────
  # Privacy-first web analytics (Google Analytics replacement)
  # No cookies, GDPR compliant, lightweight script tag
  #
  # Dashboard: http://100.117.1.171:8888  (Tailscale: http://100.95.125.112:8888)
  # Setup:
  #   1. cd /opt/monitoring && docker-compose up -d plausible_db plausible_events plausible
  #   2. Visit http://100.95.125.112:8888 → create admin account → add site
  #   3. Copy the <script> snippet → paste into your Streamlit app:
  #        st.components.v1.html('<script defer data-domain="peachstatesavings.com"
  #          src="http://100.95.125.112:8888/js/script.js"></script>', height=0)
  #   4. Repeat for College Confused pages with data-domain="collegeconfused.org"
  #
  # Tracks: unique visitors, page views, bounce rate, session duration,
  #         top pages, countries, devices, referrers — all in one clean dashboard
  # ─────────────────────────────────────────────────────────────────────────────

  plausible_db:
    image: postgres:14-alpine
    container_name: plausible_db
    restart: unless-stopped
    networks:
      - monitoring
    volumes:
      - plausible_db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=plausible
      - POSTGRES_USER=plausible
      - POSTGRES_PASSWORD=plausible2026secure
    mem_limit: 256m

  plausible_events:
    image: clickhouse/clickhouse-server:23.3.7.5-alpine
    container_name: plausible_events
    restart: unless-stopped
    networks:
      - monitoring
    volumes:
      - plausible_events_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    mem_limit: 512m

  plausible:
    image: ghcr.io/plausible/community-edition:v2.1.1
    container_name: plausible
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "8888:8000"
    command: sh -c "sleep 10 && /entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
      - plausible_db
      - plausible_events
    environment:
      - BASE_URL=http://100.95.125.112:8888
      - SECRET_KEY_BASE=${PLAUSIBLE_SECRET_KEY:-super_secret_change_me_in_production_32chars_min}
      - DATABASE_URL=postgres://plausible:plausible2026secure@plausible_db:5432/plausible
      - CLICKHOUSE_DATABASE_URL=http://plausible_events:8123/plausible_events
      - DISABLE_REGISTRATION=invite_only
    mem_limit: 256m

  # ── Alertmanager ─────────────────────────────────────────────────────────────
  # Routes alerts to phone (Pushover/Telegram) and email
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://100.117.1.171:9093"
    mem_limit: 64m
